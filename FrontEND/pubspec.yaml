# pubspec.yaml
name: asylbilim
description: AI-powered learning assistant for UNT preparation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP-запросы к API
  http: ^1.1.0

  # Для работы с JSON
  json_annotation: ^4.8.1

  # Маркдауны
  flutter_markdown: ^0.6.18
  shared_preferences: ^2.2.2

  # Голосовой ввод
  record: ^6.0.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # Управление состоянием (опционально)
  # provider: ^6.1.1
  # flutter_bloc: ^8.1.3

  # Для работы с файлами (если нужна загрузка документов)
  # file_picker: ^6.1.1
  # image_picker: ^1.0.4

  # Для красивых иконок
  # cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Генерация кода для JSON
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # Если нужны пользовательские шрифты:
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: fonts/Inter-Regular.ttf
  #       - asset: fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: fonts/Inter-SemiBold.ttf
  #         weight: 600